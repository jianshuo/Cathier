name: Auto-merge Claude PRs

on:
  pull_request:
    types: [opened, reopened]

jobs:
  auto-merge:
    # Only run for PRs created by the Claude bot
    if: github.actor == 'claude[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Auto-merge Claude PR
        run: gh pr merge "${{ github.event.pull_request.number }}" --squash --auto --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

name: Auto-merge Claude PRs

on:
  pull_request:
    types: [opened, reopened]

jobs:
  auto-merge:
    # Only run for PRs on branches created by Claude (branch name starts with 'claude/')
    if: startsWith(github.head_ref, 'claude/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Auto-merge Claude PR
        run: gh pr merge "${{ github.event.pull_request.number }}" --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
